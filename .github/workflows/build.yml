name: Build T3 Elite APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        cache: true
    
    - name: Create Android structure
      run: |
        flutter create --platforms=android .
        mkdir -p assets
        curl -o assets/back.png https://picsum.photos/1080/1920?random
    
    - name: Update AndroidManifest.xml
      run: |
        sed -i 's/android:label="[^"]*"/android:label="T3 Elite"/g' android/app/src/main/AndroidManifest.xml
        sed -i 's/android:allowBackup="[^"]*"/android:allowBackup="false"/g' android/app/src/main/AndroidManifest.xml
        sed -i '/<application/a \        android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml
    
    - name: Configure build.gradle
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
        sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle
        sed -i '/buildTypes {/a \        release {\n            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"\n        }' android/app/build.gradle
        
    - name: Create proguard-rules.pro
      run: |
        cat > android/app/proguard-rules.pro << 'EOF'
        -keep class io.flutter.app.** { *; }
        -keep class io.flutter.plugin.** { *; }
        -keep class io.flutter.util.** { *; }
        -keep class io.flutter.view.** { *; }
        -keep class io.flutter.** { *; }
        -keep class io.flutter.plugins.** { *; }
        -keepattributes *Annotation*
        -keepclassmembers class ** { @android.webkit.JavascriptInterface <methods>; }
        EOF
    
    - name: Get Flutter packages
      run: flutter pub get
      
    - name: Build APKs
      run: |
        flutter build apk --release \
          --obfuscate \
          --split-debug-info=./debug_info \
          --target-platform android-arm,android-arm64,android-x64 \
          --shrink \
          --split-per-abi
          
    - name: Rename APK files
      run: |
        cd build/app/outputs/flutter-apk/
        mv app-armeabi-v7a-release.apk T3_Elite_v2.0.0_armeabi-v7a.apk
        mv app-arm64-v8a-release.apk T3_Elite_v2.0.0_arm64-v8a.apk
        mv app-x86_64-release.apk T3_Elite_v2.0.0_x86_64.apk
        
    - name: Upload armeabi-v7a
      uses: actions/upload-artifact@v4
      with:
        name: T3_Elite_armeabi-v7a
        path: build/app/outputs/flutter-apk/T3_Elite_v2.0.0_armeabi-v7a.apk
        
    - name: Upload arm64-v8a
      uses: actions/upload-artifact@v4
      with:
        name: T3_Elite_arm64-v8a
        path: build/app/outputs/flutter-apk/T3_Elite_v2.0.0_arm64-v8a.apk
        
    - name: Upload x86_64
      uses: actions/upload-artifact@v4
      with:
        name: T3_Elite_x86_64
        path: build/app/outputs/flutter-apk/T3_Elite_v2.0.0_x86_64.apk
        
    - name: Upload all APKs
      uses: actions/upload-artifact@v4
      with:
        name: T3_Elite_All_APKs
        path: build/app/outputs/flutter-apk/*.apk
