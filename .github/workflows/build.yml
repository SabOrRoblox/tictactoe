name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.0'
          channel: 'stable'

      - name: Create project structure
        run: |
          flutter create --org com.example --project-name yourapp .
          mkdir -p android/app/src/main/kotlin/com/example/yourapp

      - name: Create MainActivity.kt
        run: |
          cat > android/app/src/main/kotlin/com/example/yourapp/MainActivity.kt << 'EOF'
          package com.example.yourapp

          import io.flutter.embedding.android.FlutterActivity
          import io.flutter.embedding.engine.FlutterEngine
          import io.flutter.plugin.common.MethodChannel
          import android.content.pm.PackageManager
          import java.security.MessageDigest

          class MainActivity: FlutterActivity() {
              private val CHANNEL = "app_integrity"

              override fun configureFlutterEngine(flutterEngine: FlutterEngine) {
                  super.configureFlutterEngine(flutterEngine)
                  MethodChannel(flutterEngine.dartExecutor.binaryMessenger, CHANNEL).setMethodCallHandler { call, result ->
                      if (call.method == "getSignatureHash") {
                          try {
                              val hash = getApkSignatureHash()
                              result.success(hash)
                          } catch (e: Exception) {
                              result.error("SIGNATURE_ERROR", e.message, null)
                          }
                      } else {
                          result.notImplemented()
                      }
                  }
              }

              private fun getApkSignatureHash(): String {
                  val packageInfo = packageManager.getPackageInfo(packageName, PackageManager.GET_SIGNATURES)
                  val signatures = packageInfo.signatures
                  if (signatures.isNullOrEmpty()) return ""
                  val signature = signatures[0]
                  val md = MessageDigest.getInstance("SHA-256")
                  val hashBytes = md.digest(signature.toByteArray())
                  return hashBytes.joinToString("") { "%02x".format(it) }
              }
          }
          EOF

      - name: Create main.dart
        run: |
          cat > lib/main.dart << 'EOF'
          import 'package:flutter/material.dart';
          import 'package:flutter/services.dart';
          import 'dart:convert';
          import 'dart:io';
          import 'package:path_provider/path_provider.dart';
          import 'package:device_info_plus/device_info_plus.dart';
          import 'package:crypto/crypto.dart';
          import 'dart:typed_data';
          import 'package:flutter_keychain/flutter_keychain.dart';
          import 'package:pointycastle/export.dart' hide Padding, State;

          void main() {
            WidgetsFlutterBinding.ensureInitialized();
            SystemChrome.setSystemUIOverlayStyle(const SystemUiOverlayStyle(
              statusBarColor: Colors.transparent,
              systemNavigationBarColor: Colors.black,
            ));
            runApp(const MyApp());
          }

          class MyApp extends StatelessWidget {
            const MyApp({super.key});
            @override
            Widget build(BuildContext context) {
              return MaterialApp(
                debugShowCheckedModeBanner: false,
                theme: ThemeData.dark().copyWith(
                  scaffoldBackgroundColor: Colors.black,
                  colorScheme: const ColorScheme.dark(
                    primary: Colors.white,
                    secondary: Colors.white70,
                    surface: Color(0xFF121212),
                  ),
                ),
                home: const SplashScreen(),
              );
            }
          }

          class SplashScreen extends StatefulWidget {
            const SplashScreen({super.key});
            @override
            State<SplashScreen> createState() => _SplashScreenState();
          }

          class _SplashScreenState extends State<SplashScreen> {
            String _status = "Initializing...";
            bool _ready = false;
            String? _error;
            String _decryptedData = "";

            @override
            void initState() {
              super.initState();
              _initialize();
            }

            Future<void> _initialize() async {
              try {
                setState(() => _status = "Checking APK integrity...");
                final integrityOk = await _checkApkIntegrity();
                if (!integrityOk) throw Exception("Integrity check failed");
                setState(() => _status = "Loading storage...");
                final storageData = await _loadFromStorage();
                if (storageData != null) {
                  setState(() {
                    _decryptedData = storageData;
                    _status = storageData;
                    _ready = true;
                  });
                } else {
                  setState(() {
                    _status = "No data";
                    _ready = true;
                  });
                }
              } catch (e) {
                setState(() {
                  _error = e.toString();
                  _status = "ERROR";
                  _ready = true;
                });
              }
            }

            Future<bool> _checkApkIntegrity() async {
              const channel = MethodChannel('app_integrity');
              try {
                final currentHash = await channel.invokeMethod('getSignatureHash');
                final storedHash = await FlutterKeychain.get(key: 'apk_signature_hash');
                if (storedHash == null) {
                  await FlutterKeychain.put(key: 'apk_signature_hash', value: currentHash);
                  return true;
                }
                return currentHash == storedHash;
              } catch (e) {
                return false;
              }
            }

            Future<String> _getDeviceFingerprint() async {
              final deviceInfo = DeviceInfoPlugin();
              String fingerprint = '';
              if (Platform.isAndroid) {
                final androidInfo = await deviceInfo.androidInfo;
                fingerprint = '${androidInfo.brand}_${androidInfo.model}_${androidInfo.board}_${androidInfo.hardware}_${androidInfo.fingerprint}_${androidInfo.serialNumber}';
              } else if (Platform.isIOS) {
                final iosInfo = await deviceInfo.iosInfo;
                fingerprint = '${iosInfo.model}_${iosInfo.identifierForVendor}_${iosInfo.utsname.machine}';
              }
              final bytes = utf8.encode(fingerprint);
              final digest = sha256.convert(bytes);
              return digest.toString();
            }

            Future<String?> _loadFromStorage() async {
              try {
                final dir = await getApplicationDocumentsDirectory();
                final file = File('${dir.path}/secure_data.enc');
                if (!file.existsSync()) return null;
                final encryptedData = await file.readAsBytes();
                final key = await _getOrCreateKey();
                final decrypted = _decryptChacha20(encryptedData, key);
                return utf8.decode(decrypted);
              } catch (e) {
                return null;
              }
            }

            Future<Uint8List> _getOrCreateKey() async {
              try {
                final existingKey = await FlutterKeychain.get(key: 'chacha_key');
                if (existingKey != null) return base64Decode(existingKey);
              } catch (_) {}
              final fingerprint = await _getDeviceFingerprint();
              final salt = utf8.encode('R7xQm2kL9pVn4Wz8');
              final keyMaterial = Uint8List.fromList(utf8.encode(fingerprint));
              final hashedKey = sha256.convert(keyMaterial + salt);
              final key = Uint8List.fromList(hashedKey.bytes);
              await FlutterKeychain.put(key: 'chacha_key', value: base64Encode(key));
              return key;
            }

            Uint8List _decryptChacha20(Uint8List encryptedData, Uint8List key) {
              final nonce = encryptedData.sublist(0, 12);
              final ciphertext = encryptedData.sublist(12);
              final cipher = ChaCha20Engine()..init(false, ParametersWithIV(KeyParameter(key), nonce));
              final decrypted = Uint8List(ciphertext.length);
              cipher.processBytes(ciphertext, 0, ciphertext.length, decrypted, 0);
              return decrypted;
            }

            @override
            Widget build(BuildContext context) {
              return PopScope(
                canPop: false,
                onPopInvokedWithResult: (didPop, result) async {
                  if (didPop) return;
                  if (_error != null) {
                    SystemNavigator.pop();
                    exit(0);
                  }
                  SystemNavigator.pop();
                },
                child: Scaffold(
                  body: Container(
                    decoration: const BoxDecoration(
                      gradient: LinearGradient(
                        begin: Alignment.topCenter,
                        end: Alignment.bottomCenter,
                        colors: [Color(0xFF0A0A0A), Color(0xFF000000)],
                      ),
                    ),
                    child: Center(
                      child: Padding(
                        padding: const EdgeInsets.all(24.0),
                        child: Column(
                          mainAxisAlignment: MainAxisAlignment.center,
                          children: [
                            if (_error != null) ...[
                              const Icon(Icons.error_outline, color: Colors.red, size: 64),
                              const SizedBox(height: 32),
                              Text(_error!, style: const TextStyle(color: Colors.red, fontSize: 14, fontFamily: 'monospace'), textAlign: TextAlign.center),
                            ],
                            if (_error == null && !_ready) ...[
                              const CircularProgressIndicator(valueColor: AlwaysStoppedAnimation<Color>(Colors.white70), strokeWidth: 2),
                              const SizedBox(height: 32),
                              Text(_status, style: const TextStyle(color: Colors.white70, fontSize: 14, fontFamily: 'monospace'), textAlign: TextAlign.center),
                            ],
                            if (_error == null && _ready && _decryptedData.isNotEmpty) ...[
                              const Icon(Icons.lock_open, color: Colors.green, size: 48),
                              const SizedBox(height: 24),
                              Text(_decryptedData, style: const TextStyle(color: Colors.green, fontSize: 16, fontFamily: 'monospace'), textAlign: TextAlign.center),
                            ],
                            if (_ready && _error != null)
                              Padding(
                                padding: const EdgeInsets.only(top: 48),
                                child: Text("App will crash on exit", style: TextStyle(color: Colors.red.withOpacity(0.7), fontSize: 12, fontFamily: 'monospace')),
                              ),
                          ],
                        ),
                      ),
                    ),
                  ),
                ),
              );
            }
          }
          EOF

      - name: Create pubspec.yaml
        run: |
          cat > pubspec.yaml << 'EOF'
          name: yourapp
          description: "Secure APK"
          publish_to: 'none'
          version: 1.0.0+1

          environment:
            sdk: '>=3.0.0 <4.0.0'

          dependencies:
            flutter:
              sdk: flutter
            pointycastle: ^3.9.1
            device_info_plus: ^10.1.2
            flutter_keychain: ^2.5.0
            crypto: ^3.0.6
            path_provider: ^2.1.5

          dev_dependencies:
            flutter_test:
              sdk: flutter

          flutter:
            uses-material-design: true
          EOF

      - name: Create build.gradle
        run: |
          cat > android/app/build.gradle << 'EOF'
          plugins {
              id "com.android.application"
              id "kotlin-android"
              id "dev.flutter.flutter-gradle-plugin"
          }

          def keystoreProperties = new Properties()
          def keystorePropertiesFile = rootProject.file('key.properties')
          if (keystorePropertiesFile.exists()) {
              keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
          }

          android {
              namespace "com.example.yourapp"
              compileSdk 35

              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_1_8
                  targetCompatibility JavaVersion.VERSION_1_8
              }

              kotlinOptions {
                  jvmTarget = '1.8'
              }

              sourceSets {
                  main.java.srcDirs += 'src/main/kotlin'
              }

              defaultConfig {
                  applicationId "com.example.yourapp"
                  minSdk 21
                  targetSdk 35
                  versionCode 1
                  versionName "1.0"
                  ndk {
                      abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
                  }
              }

              signingConfigs {
                  release {
                      keyAlias keystoreProperties['keyAlias']
                      keyPassword keystoreProperties['keyPassword']
                      storeFile file(keystoreProperties['storeFile'])
                      storePassword keystoreProperties['storePassword']
                  }
              }

              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                      minifyEnabled true
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                      ndk {
                          abiFilters 'armeabi-v7a', 'arm64-v8a', 'x86_64'
                      }
                  }
              }
          }

          flutter {
              source '../..'
          }

          dependencies {}
          EOF

      - name: Create key.properties
        run: |
          cat > android/key.properties << 'EOF'
          storeFile=../release-keystore.jks
          storePassword=android
          keyPassword=android
          keyAlias=release
          EOF

      - name: Generate keystore
        run: |
          keytool -genkey -v -keystore android/release-keystore.jks \
            -alias release -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Unknown, OU=Unknown, O=Unknown, L=Unknown, ST=Unknown, C=Unknown"

      - run: flutter pub get

      - name: Build APK
        run: |
          flutter build apk --release --obfuscate --split-debug-info=debug_info --target-platform android-arm,android-arm64,android-x64

      - name: Get signature hash
        run: |
          APK_HASH=$(keytool -printcert -jarfile build/app/outputs/flutter-apk/app-release.apk | grep -A1 "SHA256:" | tail -1 | awk '{print $2}' | tr -d ':' | tr '[:upper:]' '[:lower:]')
          echo "APK_SIGNATURE_HASH=$APK_HASH" >> $GITHUB_ENV
          echo $APK_HASH > apk_signature_hash.txt
          echo "============================================"
          echo "APK SIGNATURE HASH: $APK_HASH"
          echo "============================================"

      - uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
