# .github/workflows/build.yml
name: Build T3 Elite APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        cache: true
    
    - name: Create Android structure
      run: |
        flutter create --platforms=android .
        mkdir -p assets
        curl -o assets/back.png https://picsum.photos/1080/1920?random
    
    - name: Update AndroidManifest.xml
      run: |
        sed -i 's/android:label="[^"]*"/android:label="T3 Elite"/g' android/app/src/main/AndroidManifest.xml
        sed -i 's/android:allowBackup="[^"]*"/android:allowBackup="false"/g' android/app/src/main/AndroidManifest.xml
        sed -i '/<application/a \        android:usesCleartextTraffic="true"' android/app/src/main/AndroidManifest.xml
    
    - name: Update build.gradle
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
        sed -i '/defaultConfig {/a \        multiDexEnabled true' android/app/build.gradle
        sed -i '/defaultConfig {/a \        ndk {\n            abiFilters "armeabi-v7a", "arm64-v8a", "x86_64"\n        }' android/app/build.gradle
        sed -i '/buildTypes {/a \        release {\n            minifyEnabled true\n            shrinkResources true\n        }' android/app/build.gradle
        sed -i '/dependencies {/a \    implementation "androidx.multidex:multidex:2.0.1"' android/app/build.gradle
    
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build APKs for all architectures
      run: |
        flutter build apk --release \
          --obfuscate \
          --split-debug-info=./debug_info \
          --target-platform android-arm,android-arm64,android-x64 \
          --shrink \
          --split-per-abi
          
    - name: Upload armeabi-v7a APK
      uses: actions/upload-artifact@v4
      with:
        name: t3-elite-armeabi-v7a
        path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        
    - name: Upload arm64-v8a APK
      uses: actions/upload-artifact@v4
      with:
        name: t3-elite-arm64-v8a
        path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
        
    - name: Upload x86_64 APK
      uses: actions/upload-artifact@v4
      with:
        name: t3-elite-x86_64
        path: build/app/outputs/flutter-apk/app-x86_64-release.apk
        
    - name: Upload all APKs
      uses: actions/upload-artifact@v4
      with:
        name: t3-elite-all-architectures
        path: build/app/outputs/flutter-apk/*.apk
