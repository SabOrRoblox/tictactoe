name: Build Protected APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0'
        cache: true
    
    - name: Create Android structure
      run: |
        flutter create --platforms=android .
        mkdir -p android/app/src/main/kotlin/com/x9/snake/secure
        mkdir -p android/app/src/main/res/xml
        
    - name: Create MainActivity.kt
      run: |
        cat > android/app/src/main/kotlin/com/x9/snake/secure/MainActivity.kt << 'EOF'
        package com.x9.snake.secure
        import io.flutter.embedding.android.FlutterActivity
        class MainActivity: FlutterActivity()
        EOF
        
    - name: Create network_security_config.xml
      run: |
        cat > android/app/src/main/res/xml/network_security_config.xml << 'EOF'
        <?xml version="1.0" encoding="utf-8"?>
        <network-security-config>
            <base-config cleartextTrafficPermitted="false">
                <trust-anchors>
                    <certificates src="system"/>
                </trust-anchors>
            </base-config>
        </network-security-config>
        EOF
        
    - name: Update AndroidManifest.xml
      run: |
        sed -i 's/android:label="[^"]*"/android:label="Snow Snake X9"/g' android/app/src/main/AndroidManifest.xml
        sed -i 's/android:allowBackup="[^"]*"/android:allowBackup="false"/g' android/app/src/main/AndroidManifest.xml
        sed -i '/<application/a \        android:networkSecurityConfig="@xml/network_security_config"' android/app/src/main/AndroidManifest.xml
        
    - name: Update build.gradle
      run: |
        sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
        sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
        sed -i '/buildTypes {/a \        release {\n            minifyEnabled true\n            shrinkResources true\n            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"\n        }' android/app/build.gradle
        
    - name: Create proguard-rules.pro
      run: |
        cat > android/app/proguard-rules.pro << 'EOF'
        -flattenpackagehierarchy 'x9'
        -repackageclasses 'x9'
        -allowaccessmodification
        -keep class io.flutter.app.** { *; }
        -keep class io.flutter.plugin.** { *; }
        -keep class io.flutter.util.** { *; }
        -keep class io.flutter.view.** { *; }
        -keep class io.flutter.** { *; }
        -keep class io.flutter.plugins.** { *; }
        EOF
        
    - name: Get dependencies
      run: flutter pub get
      
    - name: Build APK with full protection
      run: |
        flutter build apk --release \
          --obfuscate \
          --split-debug-info=./debug_info \
          --target-platform android-arm64 \
          --shrink \
          --split-per-abi
          
    - name: Upload APKs
      uses: actions/upload-artifact@v4
      with:
        name: snake-x9-protected
        path: build/app/outputs/flutter-apk/*.apk
